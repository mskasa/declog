<link rel="icon" type="image/svg+xml" href="{{ '/assets/kizami-icon.svg' | relative_url }}">
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
  // Jekyll renders ```mermaid blocks as <code class="language-mermaid"> inside <pre>.
  // Convert them to <div class="mermaid"> so Mermaid.js can process them.
  document.querySelectorAll('code.language-mermaid').forEach(el => {
    const div = document.createElement('div');
    div.className = 'mermaid';
    div.textContent = el.textContent;
    el.parentElement.replaceWith(div);
  });
  mermaid.initialize({ startOnLoad: true, theme: 'dark' });
</script>
