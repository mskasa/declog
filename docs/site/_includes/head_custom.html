<link rel="icon" type="image/svg+xml" href="{{ '/assets/kizami-icon.svg' | relative_url }}">
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
  // kramdown + Rouge renders ```mermaid as:
  //   <div class="language-mermaid highlighter-rouge">
  //     <div class="highlight"><pre class="highlight"><code>...</code></pre></div>
  //   </div>
  // Convert each to <div class="mermaid"> so Mermaid.js can process them.
  mermaid.initialize({ startOnLoad: false, theme: 'dark' });
  document.querySelectorAll('.language-mermaid').forEach(el => {
    const code = el.querySelector('code');
    if (!code) return;
    const div = document.createElement('div');
    div.className = 'mermaid';
    div.textContent = code.textContent;
    el.replaceWith(div);
  });
  mermaid.run({ querySelector: '.mermaid' });
</script>
