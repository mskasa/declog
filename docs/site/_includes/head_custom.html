<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
  // Jekyll/kramdown renders ```mermaid blocks as <pre><code class="language-mermaid">.
  // Use mermaid.run() with an explicit querySelector to target them directly.
  mermaid.initialize({ startOnLoad: false, theme: 'dark' });
  await mermaid.run({ querySelector: 'pre > code.language-mermaid' });
</script>
